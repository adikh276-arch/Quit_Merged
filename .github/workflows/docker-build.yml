name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to private registry
        uses: docker/login-action@v2
        with:
          registry: bunker.mantracare.com
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: bunker.mantracare.com/lovable/quit:1.5
          build-args: |
            VITE_DATABASE_URL=${{ secrets.VITE_DATABASE_URL }}
            VITE_NEON_API_KEY=${{ secrets.VITE_NEON_API_KEY }}
            VITE_NEON_PROJECT_ID=${{ secrets.VITE_NEON_PROJECT_ID }}
